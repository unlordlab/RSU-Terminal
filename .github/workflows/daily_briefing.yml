name: Daily Market Briefing

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests yfinance pytz
      - name: Generate briefing
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
          BRIEFING_GIST_ID:     ${{ secrets.BRIEFING_GIST_ID }}
          GH_GIST_TOKEN:        ${{ secrets.GH_GIST_TOKEN }}
        run: python scripts/generate_briefing.py
