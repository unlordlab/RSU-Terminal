name: Daily Market Briefing

on:
  schedule:
    - cron: '0 7 * * 1-5'   # 08:00 CET = 07:00 UTC, lunes-viernes
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz google-genai

      - name: Generate and save briefing
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/generate_briefing.py
