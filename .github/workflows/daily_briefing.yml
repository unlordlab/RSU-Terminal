name: Daily Market Briefing

on:
  schedule:
    # 13:00 UTC = 14:00 CET (horario europeo) = 30min antes apertura USA
    # En horario de verano (CEST) = 15:00 CEST, ajustar a cron: '0 12 * * 1-5'
    - cron: '0 13 * * 1-5'
  workflow_dispatch:  # permite lanzar manualmente desde GitHub Actions

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance pytz

      - name: Generate and save briefing
        env:
  GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
  NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
  BRIEFING_GIST_ID:     ${{ secrets.BRIEFING_GIST_ID }}
  GH_GIST_TOKEN:        ${{ secrets.GH_GIST_TOKEN }}
        run: python scripts/generate_briefing.py
