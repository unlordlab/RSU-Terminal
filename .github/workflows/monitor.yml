name: RSU Monitor

on:
  schedule:
    - cron: '*/15 * * * *'  # cada 15 minutos
  workflow_dispatch:          # permite ejecutarlo manualmente también

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # necesario para hacer commit del snapshot

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run monitor
        env:
          URL_CARTERA: ${{ secrets.URL_CARTERA }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: cd monitor && python monitor.py

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitor/snapshot.json
          git diff --staged --quiet || git commit -m "chore: update snapshot [skip ci]"
          git push
