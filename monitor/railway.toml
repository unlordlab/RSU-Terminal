[deploy]
cronSchedule = "*/5 * * * *"
startCommand = "python monitor.py"
```

Sube los 3 a un **repositorio GitHub nuevo** (puede ser privado). Si no sabes usar Git:
1. github.com → **New repository** → nombre ej. `rsu-monitor` → Private → Create
2. Arrastra los 3 archivos al repositorio desde el navegador → **Commit changes**

---

### Paso 3 — Crear el proyecto en Railway

1. railway.app → **New Project**
2. → **Deploy from GitHub repo**
3. Selecciona `rsu-monitor`
4. Railway detecta el `railway.toml` automáticamente

---

### Paso 4 — Variables de entorno

En el proyecto Railway → **Variables** → añade las 3:

| Key | Value |
|-----|-------|
| `URL_CARTERA` | tu URL del Google Sheet CSV |
| `TELEGRAM_TOKEN` | token nuevo de BotFather |
| `TELEGRAM_CHAT_ID` | `910803932` |

---

### Paso 5 — Verificar que funciona

1. Railway → tu proyecto → **Deployments** → verás el primer deploy
2. Haz clic en el deployment → **View Logs**
3. Deberías ver algo como:
```
[2026-03-10 14:00:01] Iniciando check...
[2026-03-10 14:00:02] Sin cambios. Posiciones abiertas: ['AMZN', 'NVDA']
[2026-03-10 14:00:02] Check completado.
```
4. La **primera ejecución** solo crea el snapshot, no envía Telegram
5. La **siguiente vez que cambies algo en el sheet** → llega el mensaje

---

### Paso 6 — Plan de Railway

El free tier de Railway da **$5/mes de crédito**. Un cron cada 5 minutos que corre ~2 segundos consume aproximadamente **$0.10/mes** — cubre de sobra.

---

### Resumen del flujo final
```
Google Sheet (tú añades/cierras posición)
        ↓
Railway cron cada 5 min
        ↓
monitor.py compara con snapshot.json
        ↓
Si hay cambio → Telegram a tu móvil
        ↓
snapshot.json actualizado